server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Real-IP extraction (Synology reverse proxy is upstream) ──────
    # Synology's Application Portal / NGINX Proxy Manager adds the real
    # client IP in X-Forwarded-For.  Trust the Docker bridge range so
    # nginx replaces $remote_addr with the actual client IP before it
    # is forwarded to the API container.
    set_real_ip_from  10.0.0.0/8;
    set_real_ip_from  172.16.0.0/12;
    set_real_ip_from  192.168.0.0/16;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Security headers ──────────────────────────────────────────────
    add_header X-Frame-Options            "SAMEORIGIN"                    always;
    add_header X-Content-Type-Options     "nosniff"                       always;
    add_header Referrer-Policy            "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy         "geolocation=(), camera=()"     always;

    # ── API proxy → backend ───────────────────────────────────────────
    # Use Docker's internal DNS resolver (127.0.0.11) with a variable so
    # nginx resolves "api" at request time, not at startup. This prevents
    # "host not found in upstream" when the api container isn't up yet.
    resolver 127.0.0.11 valid=10s;
    set $api_upstream http://api:3000;

    location /api/ {
        proxy_pass         $api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Preserve the original protocol set by Synology's reverse proxy.
        # When Synology terminates HTTPS it sets X-Forwarded-Proto: https;
        # pass that upstream value so Express issues secure cookies correctly.
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
        # Forward cookies for refresh-token flow
        proxy_pass_header  Set-Cookie;
    }

    # ── Static assets — long cache ────────────────────────────────────
    location ~* \.(css|js|png|jpg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # ── Service worker — no cache ─────────────────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
    }

    # ── SPA fallback ──────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Favicon — suppress the 404 log noise ─────────────────────────
    location = /favicon.ico {
        log_not_found off;
        access_log    off;
        try_files     /icon-192.png =204;
    }

    # ── Block hidden files ────────────────────────────────────────────
    location ~ /\. {
        deny all;
    }
}
